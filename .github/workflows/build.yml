name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      # go.sum is intentionally absent from the repo (see CLAUDE.md), so
      # regenerate it before build/test.
      - name: tidy
        run: go mod tidy

      - name: build
        run: go build ./...

      - name: test
        run: go test -count=1 ./...
